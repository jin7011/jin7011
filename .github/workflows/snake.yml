name: generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark
      - name: fetch streak cards
        run: |
          curl -fsS -m 60 --retry 3 --retry-delay 10 \
            "https://streak-stats.demolab.com?user=${{ github.repository_owner }}&hide_border=true&background=00000000&date_format=Y.m.d" \
            -o dist/streak.svg
          curl -fsS -m 60 --retry 3 --retry-delay 10 \
            "https://streak-stats.demolab.com?user=${{ github.repository_owner }}&theme=github-dark&hide_border=true&background=00000000&date_format=Y.m.d" \
            -o dist/streak-dark.svg
          grep -q "Current Streak" dist/streak.svg
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
